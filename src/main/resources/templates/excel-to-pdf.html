<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Excel To PDF</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/excel-to-pdf.css}">

</head>


<body>

    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="/">

                <img src="/images/logo.png" alt="ConvertNova" height="50" class="me-2">

            </a>

            <button id="darkModeBtn" type="button" class="btn btn-outline-dark">

                🌙 Dark Mode

            </button>

        </div>

    </nav>

    <div class="container py-5">

        <div class="converter-card">

            <h1 class="text-center">
                Excel To PDF
            </h1>

            <p class="text-center text-muted mb-4">
                Convert Excel spreadsheets to PDF files
            </p>

            <!-- UPLOAD SECTION -->
            <div id="uploadSection">

                <form id="excelToPdfForm">

                    <div id="summaryCard" class="summary-card" style="display:none;">

                        <div>
                            <strong>Total Files:</strong>
                            <span id="totalFiles">0</span>
                        </div>

                        <div>
                            <strong>Total Size:</strong>
                            <span id="totalSize">0 MB</span>
                        </div>

                    </div>

                    <div id="fileListContainer"></div>

                    <div id="dropZone" class="upload-area">

                        <i class="bi bi-file-earmark-excel-fill upload-icon"></i>

                        <h3>
                            Drag & Drop Excel Files Here
                        </h3>

                        <p>
                            XLSX / XLS Files Only
                        </p>

                        <input type="file" id="excelFiles" accept=".xlsx,.xls" multiple hidden>

                        <p class="text-muted">
                            Maximum file size: 50 MB
                        </p>

                        <button type="button" class="btn btn-primary btn-lg"
                            onclick="document.getElementById('excelFiles').click()">

                            Choose Excel Files

                        </button>

                    </div>

                    <!-- ORIENTATION -->
                    <div class="tool-section">

                        <h4>PDF Page Orientation</h4>

                        <div class="form-check">

                            <input type="radio" id="portrait" name="orientation" value="PORTRAIT" checked
                                class="form-check-input">

                            <label for="portrait" class="form-check-label">

                                Portrait

                            </label>

                        </div>

                        <div class="form-check">

                            <input type="radio" id="landscape" name="orientation" value="LANDSCAPE"
                                class="form-check-input">

                            <label for="landscape" class="form-check-label">

                                Landscape

                            </label>

                        </div>

                    </div>

                    <!-- PAPER SIZE -->
                    <div class="tool-section">

                        <h4>Paper Size</h4>

                        <div class="form-check">

                            <input type="radio" id="a4" name="paperSize" value="A4" checked class="form-check-input">

                            <label for="a4" class="form-check-label">

                                A4

                            </label>

                        </div>

                        <div class="form-check">

                            <input type="radio" id="letter" name="paperSize" value="LETTER" class="form-check-input">

                            <label for="letter" class="form-check-label">

                                Letter

                            </label>

                        </div>

                        <div class="form-check">

                            <input type="radio" id="legal" name="paperSize" value="LEGAL" class="form-check-input">

                            <label for="legal" class="form-check-label">

                                Legal

                            </label>

                        </div>

                    </div>

                    <!-- SCALING -->
                    <div class="tool-section">

                        <h4>Scaling</h4>

                        <div class="form-check">

                            <input type="radio" id="fit" name="scaling" value="FIT" checked class="form-check-input">

                            <label for="fit" class="form-check-label">

                                Fit Sheet To Page

                            </label>

                        </div>

                        <div class="form-check">

                            <input type="radio" id="actual" name="scaling" value="ACTUAL" class="form-check-input">

                            <label for="actual" class="form-check-label">

                                Actual Size

                            </label>

                        </div>

                    </div>

                    <!-- OUTPUT QUALITY -->
                    <div class="tool-section">

                        <h4>Output Quality</h4>

                        <div class="form-check">

                            <input type="radio" id="standard" name="quality" value="STANDARD" checked
                                class="form-check-input">

                            <label for="standard" class="form-check-label">

                                Standard

                            </label>

                        </div>

                        <div class="form-check">

                            <input type="radio" id="high" name="quality" value="HIGH" class="form-check-input">

                            <label for="high" class="form-check-label">

                                High Quality

                            </label>

                        </div>

                    </div>

                    <!-- CONVERT BUTTON -->
                    <div class="text-center mt-4">

                        <button id="convertBtn" type="submit" class="btn btn-success btn-lg">

                            Convert To PDF

                        </button>

                    </div>

                </form>

            </div>


            <div id="progressContainer" class="mt-4" style="display:none;">

                <div class="progress">

                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                        role="progressbar" style="width:0%;">

                        0%

                    </div>

                </div>

            </div>
            <!-- RESULT CARD -->
            <div id="resultCard" style="display:none;">

                <div class="mt-4">

                    <h3 class="text-center text-success">
                        Conversion Successful
                    </h3>

                    <p class="text-center">

                        Converted Files:
                        <span id="resultFiles">0</span>

                    </p>

                    <p class="text-center">

                        Successful:
                        <span id="resultSuccess">0</span>

                    </p>

                    <div id="resultFilesContainer"></div>

                    <div class="text-center mt-4">

                        <button id="convertMoreBtn" type="button" class="btn btn-secondary">

                            Convert More

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PDF PREVIEW MODAL -->
    <div class="modal fade" id="pdfPreviewModal" tabindex="-1" aria-labelledby="pdfPreviewLabel" aria-hidden="true">

        <div class="modal-dialog modal-xl">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title" id="pdfPreviewLabel">

                        PDF Preview

                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    </button>

                </div>

                <div class="modal-body">

                    <!-- Excel Preview -->
                    <div id="excelPreviewContainer" style="display:none;">

                    </div>

                    <!-- PDF Preview -->
                    <iframe id="pdfPreviewFrame" style="
            display:none;
            width:100%;
            height:750px;
            border:none;
        ">
                    </iframe>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script th:src="@{/js/excel-to-pdf.js}"></script>

    <script src="/js/common-validation.js"></script>

</body>

</html>
