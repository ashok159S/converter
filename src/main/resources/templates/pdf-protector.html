<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF Protector</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/pdf-protector.css}">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="/">

                <img src="/images/logo.png" alt="ConvertNova" height="50" class="me-2">

            </a>

            <button id="darkModeBtn" class="btn btn-outline-dark">

                🌙 Dark Mode

            </button>

        </div>

    </nav>

    <div class="container py-5">

        <div class="converter-card">

            <h1 class="text-center">

                PDF Protector

            </h1>

            <p class="text-center text-muted mb-4">

                Add password protection to PDF files

            </p>

            <!-- UPLOAD SECTION -->

            <div id="uploadSection">

                <form id="protectForm">

                    <div id="summaryCard" class="summary-card" style="display:none;">

                        <div>

                            <strong>Total Files:</strong>

                            <span id="totalFiles">0</span>

                        </div>

                        <div>

                            <strong>Total Size:</strong>

                            <span id="totalSize">0 MB</span>

                        </div>

                    </div>

                    <div id="fileListContainer">

                    </div>

                    <div id="dropZone" class="upload-area">

                        <i class="bi bi-file-earmark-lock-fill upload-icon"></i>

                        <h3>

                            Drag & Drop PDF Files Here

                        </h3>

                        <p>

                            PDF Files Only

                        </p>

                        <input type="file" id="pdfFiles" accept=".pdf" multiple hidden>
                        <p class="text-muted">

                            Maximum file size:
                            50 MB

                        </p>

                        <button type="button" class="btn btn-primary btn-lg"
                            onclick="document.getElementById('pdfFiles').click()">

                            Choose PDF Files

                        </button>

                        <div class="mt-3">

                            <button id="addMoreBtn" type="button" class="btn btn-outline-primary">

                                + Add More Files

                            </button>

                        </div>

                    </div>

                    <div id="passwordSection" class="password-section" style="display:none;">

                        <div class="password-header">

                            <div>

                                File Name

                            </div>

                            <div>

                                PDF Password

                            </div>

                        </div>

                        <div id="passwordContainer">

                        </div>

                    </div>

                    <div class="text-center mt-4">

                        <button id="protectBtn" type="submit" class="btn btn-primary btn-lg">

                            Protect PDF

                        </button>

                    </div>

                </form>

            </div>

            <div id="progressSection" class="mt-4" style="display:none;">

                <div class="progress">

                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                        style="width:0%">

                        0%

                    </div>

                </div>

            </div>

            <!-- RESULT SECTION -->

            <div id="resultCard" style="display:none;">

                <div class="alert alert-success">

                    <h4>

                        🔒 PDF Protection Completed

                    </h4>

                </div>

                <div class="result-header">

                    <div class="row fw-bold text-center">

                        <div class="col-md-4">

                            File Name

                        </div>

                        <div class="col-md-2">

                            Size

                        </div>

                        <div class="col-md-2">

                            Preview

                        </div>

                        <div class="col-md-4">

                            Download

                        </div>

                    </div>

                </div>

                <div id="protectedFilesContainer">

                </div>

                <div class="result-summary">

                    Files:
                    <span id="resultFiles">0</span>

                    |

                    Protected Successfully:
                    <span id="resultSuccess">0</span>

                </div>

                <div class="text-center mt-4">

                    <button id="protectMoreBtn" class="btn btn-secondary btn-lg">

                        Protect More

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- PDF PREVIEW MODAL -->

    <div class="modal fade" id="pdfPreviewModal">

        <div class="modal-dialog modal-xl">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">

                        PDF Preview

                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" title="Close">
                    </button>

                </div>

                <div class="modal-body p-0">

                    <iframe id="previewFrame" width="100%" height="700" style="border:none;">

                    </iframe>

                </div>

            </div>

        </div>

    </div>

    <script th:src="@{/js/pdf-protector.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/common-validation.js"></script>

</body>

</html>
