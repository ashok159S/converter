<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF Merger</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/pdf-merger.css}">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="/">

                <img src="/images/logo.png" alt="ConvertNova" height="50" class="me-2">

            </a>

            <div class="ms-auto">

                <button id="darkModeBtn" class="btn btn-outline-dark">

                    🌙 Dark Mode

                </button>

            </div>

        </div>

    </nav>

    <div class="container py-5">

        <div class="card converter-card">

            <div class="card-body p-5">

                <h1 class="text-center mb-3">

                    PDF Merger

                </h1>

                <p class="text-center text-muted mb-5">
                    Upload PDF files, arrange them and merge them into a single PDF.
                </p>

                <form id="mergeForm">

                    <!-- Summary -->

                    <div id="summaryCard" class="alert alert-primary d-none summary-wrapper">

                        <div class="row text-center align-items-center">

                            <div class="col-3">
                                <strong>Total Files</strong><br>
                                <span id="totalFiles">0</span>
                            </div>

                            <div class="col-3">
                                <strong>Total Size</strong><br>
                                <span id="totalSize">0 MB</span>
                            </div>

                            <div class="col-3">
                                <strong>Preview</strong>
                            </div>

                            <div class="col-3">
                                <strong>Delete</strong>
                            </div>

                        </div>

                    </div>

                    <!-- File List -->

                    <div id="fileList" class="file-list-wrapper">

                    </div>

                    <!-- Upload Area -->
                    <div id="uploadSection" class="upload-section">

                        <div id="dropZone" class="upload-area text-center mx-auto">

                            <i class="bi bi-file-earmark-pdf-fill upload-icon"></i>

                            <h3>

                                Drag & Drop PDF Files Here

                            </h3>

                            <p>

                                Or click below to browse

                            </p>

                            <label for="pdfFiles" class="visually-hidden">
                                Select PDF files
                            </label>

                            <input type="file" id="pdfFiles" name="pdfFiles" class="d-none" accept=".pdf" multiple
                                title="Select PDF files">

                            <p class="text-muted">

                                Maximum file size:
                                50 MB

                            </p>
                            <div class="mt-3">

                                <button type="button" class="btn btn-primary btn-lg"
                                    onclick="document.getElementById('pdfFiles').click()">

                                    Choose PDF Files

                                </button>

                                <button type="button" id="addMoreBtn" class="btn btn-outline-primary btn-lg ms-2">

                                    + Add More Files

                                </button>

                            </div>
                        </div>

                        <!-- Merge Button -->

                        <div id="mergeButtonSection" class="mt-4 text-center">

                            <button id="mergeBtn" type="submit" class="btn btn-primary btn-lg merge-btn">

                                Merge PDFs

                            </button>

                        </div>
                    </div>

                    <!-- Progress -->

                    <div id="progressSection" class="mt-5" style="display:none;">

                        <div class="progress">

                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                                style="width:0%">

                                0%

                            </div>

                        </div>

                    </div>

                </form>

                <!-- Result -->

                <div id="resultCard" style="display:none;" class="mt-5">

                    <div class="alert alert-success">

                        <h4>

                            🎉 PDF Merged Successfully

                        </h4>

                    </div>

                    <div class="card">

                        <div class="card-body">

                            <div class="row">

                                <div class="col-md-6">

                                    <strong>

                                        File Name

                                    </strong>

                                    <input type="text" id="pdfName" class="form-control mt-2" value="merged.pdf">

                                </div>

                                <div class="col-md-6">

                                    <strong>

                                        File Size

                                    </strong>

                                    <p id="pdfSize">

                                        0 MB

                                    </p>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="text-center mt-4">

                        <button type="button" id="previewBtn" class="btn btn-primary btn-lg me-2">

                            Preview PDF

                        </button>

                        <a id="downloadBtn" href="#" class="btn btn-success btn-lg me-2">

                            Download PDF

                        </a>

                        <button id="convertMoreBtn" type="button" class="btn btn-secondary btn-lg">

                            Merge More

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PDF Preview Modal -->

    <div class="modal fade" id="pdfPreviewModal">

        <div class="modal-dialog modal-xl">

            <div class="modal-content">

                <div class="modal-header">

                    <h5>

                        PDF Preview

                    </h5>


                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" title="Close">
                    </button>

                </div>

                <div class="modal-body p-0">

                    <iframe id="previewFrame" width="100%" height="700" style="border:none;">
                    </iframe>

                </div>

            </div>

        </div>

    </div>

    <script th:src="@{/js/pdf-merger.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/common-validation.js"></script>

</body>

</html>
