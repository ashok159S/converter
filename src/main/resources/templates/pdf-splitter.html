<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PDF Splitter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/pdf-splitter.css}">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

         <a class="navbar-brand d-flex align-items-center"
        href="/">

            <img src="/images/logo.png"
                alt="ConvertNova"
                height="50"
                class="me-2">

        </a>

        <div class="ms-auto">

            <button id="darkModeBtn"
                    class="btn btn-outline-dark">

                🌙 Dark Mode

            </button>

        </div>

    </div>

</nav>

<div class="container py-5">

    <div class="card converter-card">

        <div class="card-body p-5">

            <h1 class="text-center mb-3">

                PDF Splitter

            </h1>

            <p class="text-center text-muted mb-5">

                Upload a PDF and split each page into a separate PDF file.

            </p>

            <form id="splitForm">

                <!-- Selected File -->

                <div id="selectedFileCard"
                    class="mt-4"
                    style="display:none;">

                    <div class="card">

                        <div class="card-body">

                            <div class="row align-items-center text-center">

                                <div class="col-md-5 text-start">

                                    <i class="bi bi-file-earmark-pdf-fill text-danger me-2"></i>

                                    <a href="#"
                                    id="selectedFileName"
                                    class="file-name-link">

                                    </a>

                                </div>

                                <div class="col-md-2">

                                    <span id="selectedFileSize"
                                        class="file-size">

                                    </span>

                                </div>

                                <div class="col-md-2">

                                    <button type="button"
                                            id="previewSourceBtn"
                                            class="btn btn-primary btn-sm">

                                        Preview

                                    </button>

                                </div>

                                <div class="col-md-2">

                                    <button type="button"
                                            id="deleteSourceBtn"
                                            class="btn btn-danger btn-sm">

                                        Delete

                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- Upload Area -->

                <div id="dropZone"
                    class="upload-area text-center">

                    <i class="bi bi-file-earmark-pdf-fill upload-icon"></i>

                    <h3>

                        Drag & Drop PDF Here

                    </h3>

                    <p>

                        Or click below to browse

                    </p>

                    <input type="file"
                        id="pdfFile"
                        class="d-none"
                        accept=".pdf">
                       <p class="text-muted">

                    Maximum file size:
                    50 MB

                    </p>

                    <button type="button"
                            class="btn btn-primary btn-lg mt-3"
                            onclick="document.getElementById('pdfFile').click()">

                        Choose PDF

                    </button>

                </div>

                <!-- Split Button -->

                <div class="text-center mt-4">

                    <button id="splitBtn"
                            type="submit"
                            class="btn btn-primary btn-lg">

                        Split PDF

                    </button>

                </div>

                <!-- Progress -->

                <div id="progressSection"
                    class="mt-4"
                    style="display:none;">

                    <div class="progress">

                        <div id="progressBar"
                            class="progress-bar progress-bar-striped progress-bar-animated"
                            style="width:0%">

                            0%

                        </div>

                    </div>

                </div>

            </form>

            <!-- Result -->

            <div id="resultCard"
                 class="mt-5"
                 style="display:none;">

                <div class="alert alert-success">

                    <h4>

                        🎉 PDF Split Successfully

                    </h4>

                </div>

                <div class="result-header mb-3">

                    <div class="row">

                        <div class="col-md-4">

                            <strong>File Name</strong>

                        </div>

                        <div class="col-md-2">

                            <strong>File Size</strong>

                        </div>

                        <div class="col-md-3 text-center">

                            <strong>Preview</strong>

                        </div>

                        <div class="col-md-3 text-center">

                            <strong>Download</strong>

                        </div>

                    </div>

                </div>

                <div id="pdfDownloads">

                </div>

                <div class="text-center mt-4">

                    <button id="splitMoreBtn"
                            type="button"
                            class="btn btn-secondary btn-lg">

                        Split More

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- PDF Preview Modal -->

<div class="modal fade"
     id="pdfPreviewModal">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <div class="modal-header">

                <h5>

                    PDF Preview

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body p-0">

                <iframe id="previewFrame"
                        width="100%"
                        height="700"
                        style="border:none;">
                </iframe>

            </div>

        </div>

    </div>

</div>

<script th:src="@{/js/pdf-splitter.js}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/common-validation.js"></script>

</body>
</html>
