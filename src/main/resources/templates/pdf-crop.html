<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF Crop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/pdf-crop.css}">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="/">

                <img src="/images/logo.png" alt="ConvertNova" height="50" class="me-2">

            </a>

            <button id="darkModeBtn" class="btn btn-outline-dark">

                🌙 Dark Mode

            </button>

        </div>

    </nav>

    <div class="container py-5">

        <div class="converter-card">

            <h1 class="text-center">

                PDF Crop

            </h1>

            <p class="text-center text-muted mb-4">

                Crop unwanted margins from PDF pages

            </p>

            <form id="pdfCropForm">

                <div id="uploadSection">

                    <!-- SUMMARY -->

                    <div id="summaryCard" class="summary-card" style="display:none;">

                        <div>

                            <strong>Total Files:</strong>

                            <span id="totalFiles">0</span>

                        </div>

                        <div>

                            <strong>Total Size:</strong>

                            <span id="totalSize">0 MB</span>

                        </div>

                    </div>

                    <!-- FILE LIST -->

                    <div id="fileListContainer">

                    </div>

                    <!-- UPLOAD -->

                    <div id="dropZone" class="upload-area">

                        <i class="bi bi-crop upload-icon"></i>

                        <h3>

                            Drag & Drop PDF Files Here

                        </h3>

                        <p>

                            PDF Files Only

                        </p>

                        <input type="file" id="pdfFiles" accept=".pdf" multiple hidden>

                        <p class="text-muted">

                            Maximum file size:
                            50 MB

                        </p>

                        <button type="button" class="btn btn-primary btn-lg"
                            onclick="document.getElementById('pdfFiles').click()">

                            Choose PDF Files

                        </button>

                    </div>

                    <!-- CROP AMOUNT -->
                    <!-- SETTINGS -->
                    <div id="settingsSection" class="settings-card">

                        <div class="tool-section">

                            <h4>Crop Amount</h4>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="cropSmall" name="cropAmount"
                                    value="SMALL" title="Small Crop">

                                <label class="form-check-label" for="cropSmall">
                                    Small Crop
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="cropMedium" name="cropAmount"
                                    value="MEDIUM" checked title="Medium Crop">

                                <label class="form-check-label" for="cropMedium">
                                    Medium Crop
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="cropLarge" name="cropAmount"
                                    value="LARGE" title="Large Crop">

                                <label class="form-check-label" for="cropLarge">
                                    Large Crop
                                </label>
                            </div>

                        </div>

                        <div class="tool-section">

                            <h4>Apply Crop To</h4>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="applyAll" name="applyTo" value="ALL"
                                    checked title="Apply crop to all pages">

                                <label class="form-check-label" for="applyAll">
                                    All Pages
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="applyFirst" name="applyTo"
                                    value="FIRST" title="Apply crop to first page only">

                                <label class="form-check-label" for="applyFirst">
                                    First Page Only
                                </label>
                            </div>

                        </div>

                    </div>

                    <!-- BUTTON -->

                    <div class="text-center mt-4">

                        <button id="cropBtn" type="submit" class="btn btn-primary btn-lg">

                            Crop PDF

                        </button>

                    </div>

                    <!-- PROGRESS -->

                    <div id="progressSection" class="mt-4" style="display:none;">

                        <div class="progress">

                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                                style="width:0%;">

                                0%

                            </div>

                        </div>

                    </div>

                </div>

            </form>

            <div id="resultCard" class="mt-5" style="display:none;">

                <div class="alert alert-success">

                    <h4>

                        🎉 PDF Cropping Completed

                    </h4>

                </div>

                <div class="result-header">

                    <div class="row fw-bold text-center">

                        <div class="col-md-4">

                            File Name

                        </div>

                        <div class="col-md-2">

                            Pages

                        </div>

                        <div class="col-md-2">

                            Crop

                        </div>

                        <div class="col-md-2">

                            Preview

                        </div>

                        <div class="col-md-2">

                            Download

                        </div>

                    </div>

                </div>

                <div id="croppedFilesContainer">

                </div>

                <div class="result-summary">

                    Files:
                    <span id="resultFiles">0</span>

                    |

                    Cropped Successfully:
                    <span id="resultSuccess">0</span>

                </div>

                <div class="text-center mt-4">

                    <button id="cropMoreBtn" type="button" class="btn btn-secondary btn-lg">

                        Crop More

                    </button>

                </div>

            </div>

        </div>

    </div>

    <div class="modal fade" id="pdfPreviewModal">

        <div class="modal-dialog modal-xl">

            <div class="modal-content">

                <div class="modal-header">

                    <h5>

                        PDF Preview

                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" title="Close">
                    </button>

                    </button>

                </div>

                <div class="modal-body p-0">

                    <iframe id="previewFrame" width="100%" height="700" style="border:none;">

                    </iframe>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/pdf-crop.js}"></script>

    <script src="/js/common-validation.js"></script>

</body>

</html>
