<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PDF Crop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/pdf-crop.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light shadow-sm">

    <div class="container">

         <a class="navbar-brand d-flex align-items-center"
        href="/">

            <img src="/images/logo.png"
                alt="ConvertNova"
                height="50"
                class="me-2">

        </a>

    </div>

</nav>

<div class="container py-5">

    <div class="converter-card">

        <h1 class="text-center">

            PDF Crop

        </h1>

        <p class="text-center text-muted mb-4">

            Crop unwanted margins from PDF pages

        </p>

        <form id="pdfCropForm">

            <!-- SUMMARY -->

            <div id="summaryCard"
                 class="summary-card"
                 style="display:none;">

                <div>

                    <strong>Total Files:</strong>

                    <span id="totalFiles">0</span>

                </div>

                <div>

                    <strong>Total Size:</strong>

                    <span id="totalSize">0 MB</span>

                </div>

            </div>

            <!-- FILE LIST -->

            <div id="fileListContainer">

            </div>

            <!-- UPLOAD -->

            <div id="dropZone"
                 class="upload-area">

                <i class="bi bi-crop upload-icon"></i>

                <h3>

                    Drag & Drop PDF Files Here

                </h3>

                <p>

                    PDF Files Only

                </p>

                <input type="file"
                       id="pdfFiles"
                       accept=".pdf"
                       multiple
                       hidden>

                   <p class="text-muted">

                    Maximum file size:
                    50 MB

                    </p>

                <button type="button"
                        class="btn btn-primary btn-lg"
                        onclick="document.getElementById('pdfFiles').click()">

                    Choose PDF Files

                </button>

            </div>

            <!-- CROP AMOUNT -->

            <div class="tool-section">

                <h4>

                    Crop Amount

                </h4>

                <div class="form-check">

                    <input class="form-check-input"
                           type="radio"
                           name="cropAmount"
                           value="SMALL">

                    <label class="form-check-label">

                        Small Crop

                    </label>

                </div>

                <div class="form-check">

                    <input class="form-check-input"
                           type="radio"
                           name="cropAmount"
                           value="MEDIUM"
                           checked>

                    <label class="form-check-label">

                        Medium Crop

                    </label>

                </div>

                <div class="form-check">

                    <input class="form-check-input"
                           type="radio"
                           name="cropAmount"
                           value="LARGE">

                    <label class="form-check-label">

                        Large Crop

                    </label>

                </div>

            </div>

            <!-- APPLY TO -->

            <div class="tool-section">

                <h4>

                    Apply Crop To

                </h4>

                <div class="form-check">

                    <input class="form-check-input"
                           type="radio"
                           name="applyTo"
                           value="ALL"
                           checked>

                    <label class="form-check-label">

                        All Pages

                    </label>

                </div>

                <div class="form-check">

                    <input class="form-check-input"
                           type="radio"
                           name="applyTo"
                           value="FIRST">

                    <label class="form-check-label">

                        First Page Only

                    </label>

                </div>

            </div>

            <!-- BUTTON -->

            <div class="text-center mt-4">

                <button type="submit"
                        class="btn btn-primary btn-lg">

                    Crop PDF

                </button>

            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/pdf-crop.js}"></script>

<script src="/js/common-validation.js"></script>

</body>

</html>
