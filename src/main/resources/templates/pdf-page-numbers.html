<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PDF Page Numbers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/pdf-page-numbers.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center"
        href="/">

            <img src="/images/logo.png"
                alt="ConvertNova"
                height="50"
                class="me-2">

        </a>

        <button id="darkModeBtn"
                class="btn btn-outline-dark">

            🌙 Dark Mode

        </button>

    </div>

</nav>

<div class="container py-5">

    <div class="converter-card">

        <h1 class="text-center">

            PDF Page Numbers

        </h1>

        <p class="text-center text-muted mb-4">

            Add page numbers to PDF files

        </p>

        <div id="uploadSection">

            <form id="pageNumberForm">

                <div id="summaryCard"
                     class="summary-card"
                     style="display:none;">

                    <div>

                        <strong>Total Files:</strong>

                        <span id="totalFiles">0</span>

                    </div>

                    <div>

                        <strong>Total Size:</strong>

                        <span id="totalSize">0 MB</span>

                    </div>

                </div>

                <div id="fileListContainer">

                </div>

                <div id="dropZone"
                     class="upload-area">

                    <i class="bi bi-file-earmark-pdf-fill upload-icon"></i>

                    <h3>

                        Drag & Drop PDF Files Here

                    </h3>

                    <p>

                        PDF Files Only

                    </p>

                    <input type="file"
                           id="pdfFiles"
                           accept=".pdf"
                           multiple
                           hidden>

                       <p class="text-muted">

                    Maximum file size:
                    50 MB

                    </p>

                    <button type="button"
                            class="btn btn-primary btn-lg"
                            onclick="document.getElementById('pdfFiles').click()">

                        Choose PDF Files

                    </button>

                </div>

                <div class="tool-section">

                    <h4>

                        Page Number Position

                    </h4>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="position"
                               value="BOTTOM_CENTER"
                               checked>

                        <label class="form-check-label">

                            Bottom Center

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="position"
                               value="BOTTOM_RIGHT">

                        <label class="form-check-label">

                            Bottom Right

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="position"
                               value="BOTTOM_LEFT">

                        <label class="form-check-label">

                            Bottom Left

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="position"
                               value="TOP_CENTER">

                        <label class="form-check-label">

                            Top Center

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="position"
                               value="TOP_RIGHT">

                        <label class="form-check-label">

                            Top Right

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="position"
                               value="TOP_LEFT">

                        <label class="form-check-label">

                            Top Left

                        </label>

                    </div>

                </div>

                <div class="tool-section">

                    <label class="form-label">

                        Starting Number

                    </label>

                    <input type="number"
                           id="startNumber"
                           class="form-control"
                           value="1">

                </div>

                <div class="tool-section">

                    <label class="form-label">

                        Font Size

                    </label>

                    <input type="number"
                           id="fontSize"
                           class="form-control"
                           value="12">

                </div>

                <div class="tool-section">

                    <h4>

                        Page Format

                    </h4>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="pageFormat"
                               value="NUMBER"
                               checked>

                        <label class="form-check-label">

                            1

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="pageFormat"
                               value="PAGE_NUMBER">

                        <label class="form-check-label">

                            Page 1

                        </label>

                    </div>

                    <div class="form-check">

                        <input type="radio"
                               class="form-check-input"
                               name="pageFormat"
                               value="PAGE_OF_TOTAL">

                        <label class="form-check-label">

                            Page 1 of 10

                        </label>

                    </div>

                </div>

                <div class="text-center mt-4">

                    <button type="submit"
                            class="btn btn-primary btn-lg">

                        Add Page Numbers

                    </button>

                </div>

            </form>

        </div>

        <div id="resultCard"
             style="display:none;">

            <div class="alert alert-success">

                <h4>

                    ✅ PDF Page Numbers Added

                </h4>

            </div>

            <div id="resultFilesContainer">

            </div>

            <div class="result-summary">

                Files:
                <span id="resultFiles">0</span>

                |

                Processed Successfully:
                <span id="resultSuccess">0</span>

            </div>

            <div class="text-center mt-4">

                <button id="addMoreBtn"
                        class="btn btn-secondary">

                    Add More Files

                </button>

            </div>

        </div>

    </div>

</div>

<!-- LARGE PREVIEW POPUP -->

<div class="modal fade"
     id="pdfPreviewModal">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    PDF Preview

                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body p-0">

                <iframe id="pdfPreviewFrame"
                        width="100%"
                        height="750"
                        style="border:none;">
                </iframe>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/pdf-page-numbers.js}"></script>

<script src="/js/common-validation.js"></script>

</body>

</html>
