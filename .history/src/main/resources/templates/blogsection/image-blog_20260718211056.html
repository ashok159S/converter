<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->

    <title>
        PDF Guides & Tutorials | ConvertNova PDF Blog
    </title>

    <meta name="description"
        content="Explore free PDF guides and tutorials from ConvertNova. Learn how to merge, split, compress, convert, crop, rotate, watermark, protect, unlock, and edit PDF files online.">

    <meta name="keywords"
        content="PDF Blog, PDF Guides, PDF Tutorials, Merge PDF, Split PDF, Compress PDF, PDF to Word, Word to PDF, PDF to Image, Crop PDF, Rotate PDF, Watermark PDF, Password Protect PDF, Unlock PDF, Extract Text from PDF, ConvertNova">

    <meta name="robots" content="index, follow">

    <meta name="author" content="ConvertNova">

    <link rel="canonical" href="https://www.convertnova.com/blog/pdf">

    <!-- Open Graph -->

    <meta property="og:type" content="website">

    <meta property="og:title" content="PDF Guides & Tutorials | ConvertNova PDF Blog">

    <meta property="og:description"
        content="Free step-by-step PDF tutorials covering merging, splitting, compression, conversion, security, and editing.">

    <meta property="og:url" content="https://www.convertnova.com/blog/pdf">

    <meta property="og:image" content="https://www.convertnova.com/images/blog/pdf-blog-cover.png">

    <!-- Twitter -->

    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title" content="PDF Guides & Tutorials | ConvertNova PDF Blog">

    <meta name="twitter:description"
        content="Learn everything about PDF conversion, editing, compression, security, and file management with ConvertNova.">

    <meta name="twitter:image"
        content="https://www.convertnova.com/images/blog/pdf-blog-cover.png">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" th:href="@{/css/blog.css}">

    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <link rel="stylesheet" th:href="@{/css/navbar.css}">

</head>

<body>

    <!-- Navbar -->

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- ===========================================
BLOG HERO
=========================================== -->

    <section class="blog-hero">

        <div class="container text-center">

            <h1>

                ConvertNova Blog

            </h1>

            <p>

                Learn everything about PDF, Image and Office file conversion
                with step-by-step tutorials and helpful guide.htmls.

            </p>

        </div>

    </section>

    <!-- ===========================================
SEARCH
=========================================== -->

    <section class="blog-search">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-7">

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-search"></i>

                        </span>

                        <input type="text" class="form-control" id="blogSearch" placeholder="Search articles...">

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- ===========================================
CATEGORY FILTER
=========================================== -->

   <section class="blog-filter">
    <div class="container text-center">

        <a href="/blogsection/blog" class="btn btn-outline-primary">All</a>

        <a href="/blogsection/pdf" class="btn btn-outline-primary">PDF</a>

        <a href="/blogsection/image" class="btn btn-primary">Image</a>

        <a href="/blogsection/office" class="btn btn-outline-primary">Office</a>

        <a href="/blogsection/security" class="btn btn-outline-primary">Security</a>

    </div>
</section>




 <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/email-valid.js"></script>

</html>
